# Tema oscuro profesional del dashboard.
[theme]
base = "dark"
primaryColor = "#4c8dff"          # azul de acento (acciones, foco)
backgroundColor = "#0b0e14"       # plano de la pagina (casi negro azulado)
secondaryBackgroundColor = "#141a24"  # tarjetas, sidebar y widgets
textColor = "#e6e9ef"             # texto principal
font = "sans serif"

[server]
runOnSave = false
