# Tema oscuro "sala de vigilancia epidemiologica".
# Los mismos valores viven en src/visualizations.py (graficos) y src/ui.py (CSS).
[theme]
base = "dark"
primaryColor = "#22d3ee"              # acento de marca: foco, sliders, acciones
backgroundColor = "#080e1a"           # plano de la pagina
secondaryBackgroundColor = "#0f1829"  # tarjetas, sidebar y widgets
textColor = "#f1f5f9"                 # tinta principal
font = "sans serif"

[server]
runOnSave = false
