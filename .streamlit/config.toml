# Tema claro elegante (estetica tipo ChurnSense: acento turquesa, superficies claras).
[theme]
base = "light"
primaryColor = "#0ea5a4"          # turquesa de acento (acciones, foco, sliders)
backgroundColor = "#f4f7fa"       # plano de la pagina (gris muy claro)
secondaryBackgroundColor = "#ffffff"  # tarjetas, sidebar y widgets
textColor = "#0f172a"             # tinta principal (slate)
font = "sans serif"

[server]
runOnSave = false
