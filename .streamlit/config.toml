# Tema claro. Los mismos valores viven en src/visualizations.py (graficos)
# y src/ui.py (CSS de la interfaz).
[theme]
base = "light"
primaryColor = "#0d9488"              # acento de marca: foco, sliders, acciones
backgroundColor = "#f5f7fa"           # plano de la pagina
secondaryBackgroundColor = "#ffffff"  # tarjetas, sidebar y widgets
textColor = "#0f172a"                 # tinta principal
font = "sans serif"

[server]
runOnSave = false
